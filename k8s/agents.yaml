apiVersion: batch/v1
kind: CronJob
metadata:
  name: tradingagents-portfolio-daily
  namespace: tradingagents
spec:
  schedule: "0 21 * * 1-5" # 9 PM UTC Mon-Fri
  suspend: true
  concurrencyPolicy: Allow
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: trader
            image: ghcr.io/madhuboyin/tradingagents:latest-arm64
            imagePullPolicy: IfNotPresent
            args: ["portfolio"]
            resources:
              requests:
                cpu: "1000m"
                memory: "1Gi"
              limits:
                cpu: "2000m"
                memory: "2Gi"
            envFrom:
            - secretRef:
                name: tradingagents-secrets
            env:
            - name: TRADINGAGENTS_LLM_PROVIDER
              value: "google"
            - name: TRADINGAGENTS_DEEP_THINK_LLM
              value: "gemini-2.5-flash"
            - name: TRADINGAGENTS_QUICK_THINK_LLM
              value: "gemini-2.5-flash"
            - name: TRADINGAGENTS_PORTFOLIO_MAX_CONCURRENCY
              value: "2"
            - name: TRADINGAGENTS_WEBHOOK_URL
              value: "http://tradingagents-dashboard-svc.tradingagents.svc.cluster.local/api/webhook/progress"
            - name: TRADINGAGENTS_LOG_LEVEL
              value: "WARNING"
            - name: PYTHONOPTIMIZE
              value: "1"
            - name: YF_CACHE_DIR
              value: "/home/appuser/.tradingagents/cache/yfinance"
            volumeMounts:
            - name: data
              mountPath: /home/appuser/.tradingagents
          restartPolicy: OnFailure
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: tradingagents-pvc
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tradingagents-cleanup
  namespace: tradingagents
spec:
  schedule: "0 0 * * 0" # Weekly at midnight Sunday
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cleanup
            image: busybox
            args:
            - /bin/sh
            - -c
            - "find /data/cache/checkpoints -type f -mtime +30 -delete"
            volumeMounts:
            - name: data
              mountPath: /data
          restartPolicy: OnFailure
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: tradingagents-pvc
